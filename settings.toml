train_path = "data/train.json"
dev_path = "data/dev.json"
test_path = "data/test.json"

optimizer = "srp"
num_threads = 4
seed = 42

[copro]
breadth = 10
depth = 3
init_temperature = 1.0

[simba]
max_steps = 6
bsize = 32
num_candidates = 6

[gepa]
auto = "light"

[srp]
max_iters = 6
patience = 2
max_error_cases = 12
