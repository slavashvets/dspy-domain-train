[tools]
python = "3.13.9"
uv = "0.11.15"

[settings]
python.uv_venv_auto = true

[tasks.sync]
description = "Install locked project dependencies"
run = "uv sync --locked --group dev"

# --- Optimizer tasks ---

[tasks.copro]
description = "Run COPRO optimizer (full dataset)"
run = "LITELLM_LOG=ERROR DSPY_OPTIMIZER=copro uv run --locked dspy-domain-train"

[tasks.simba]
description = "Run SIMBA optimizer (full dataset)"
run = "LITELLM_LOG=ERROR DSPY_OPTIMIZER=simba uv run --locked dspy-domain-train"

[tasks.gepa]
description = "Run GEPA optimizer (full dataset)"
run = "LITELLM_LOG=ERROR DSPY_OPTIMIZER=gepa uv run --locked dspy-domain-train"

[tasks."copro:demo"]
description = "COPRO on small sample (smoke-test)"
run = "LITELLM_LOG=ERROR DSPY_PROFILE=demo DSPY_OPTIMIZER=copro uv run --locked dspy-domain-train"

[tasks."simba:demo"]
description = "SIMBA on small sample (smoke-test)"
run = "LITELLM_LOG=ERROR DSPY_PROFILE=demo DSPY_OPTIMIZER=simba uv run --locked dspy-domain-train"

[tasks."gepa:demo"]
description = "GEPA on small sample (smoke-test)"
run = "LITELLM_LOG=ERROR DSPY_PROFILE=demo DSPY_OPTIMIZER=gepa uv run --locked dspy-domain-train"

# --- Dev tools ---

[tasks.lint]
description = "Run linters"
run = [
  "uv run --locked --group dev ruff check .",
  "uv run --locked --group dev ruff format --check .",
  "uv run --locked --group dev mypy src tests",
]

[tasks.format]
description = "Format Python files"
run = "uv run --locked --group dev ruff format ."

[tasks.test]
description = "Run unit tests"
run = "LITELLM_LOG=ERROR uv run --locked python -m unittest discover -s tests"

[tasks.convert-data]
description = "Download MultiWOZ 2.2 and convert to train/dev/test JSON"
run = "uv run --script scripts/convert_multiwoz.py"

[tasks.check]
description = "Run all local checks"
run = [
  "uv run --locked --group dev ruff check .",
  "uv run --locked --group dev ruff format --check .",
  "uv run --locked --group dev mypy src tests",
  "LITELLM_LOG=ERROR uv run --locked python -m unittest discover -s tests",
  "uv run --locked python -m compileall -q src tests",
]
